workflows:

  ios-workflow:
    name: GeoCrop iOS
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: 16.2
      node: 18
      cocoapods: default
      vars:
        # Override in Codemagic dashboard → Environment variables if needed
        BUNDLE_ID: com.field.geocrop
        APP_NAME: GeoCrop

    scripts:

      - name: Install Node dependencies
        script: |
          cd frontend
          npm install

      - name: Add Capacitor iOS platform
        script: |
          cd frontend
          # Only add if not already present (first build generates it; subsequent builds skip)
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Copy native Swift plugin into Xcode project
        script: |
          # ios-plugin/ holds the Swift + Obj-C bridge files committed to the repo.
          # Copy them into the generated Xcode project so Xcode compiles them.
          cp frontend/ios-plugin/MBTilesPlugin.swift frontend/ios/App/App/
          cp frontend/ios-plugin/MBTilesPlugin.m     frontend/ios/App/App/

      - name: Sync Capacitor (copy web assets + plugins)
        script: |
          cd frontend
          npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd frontend/ios/App
          pod install

      - name: Build unsigned IPA (no code signing required)
        script: |
          cd frontend/ios/App

          # Archive the app without code signing
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            DEVELOPMENT_TEAM="" \
            archive \
            -archivePath build/GeoCrop.xcarchive

          # Package into an unsigned IPA
          mkdir -p build/ipa/Payload
          cp -r build/GeoCrop.xcarchive/Products/Applications/App.app \
                build/ipa/Payload/
          cd build/ipa
          zip -r GeoCrop.ipa Payload/

    artifacts:
      - frontend/ios/App/build/ipa/GeoCrop.ipa
      - frontend/ios/App/build/GeoCrop.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - pepukaichi@gmail.com
        notify:
          success: true
          failure: true

# ─────────────────────────────────────────────────────────────────────────────
# HOW TO USE
# ─────────────────────────────────────────────────────────────────────────────
# 1. Push this repo to GitHub / GitLab / Bitbucket.
# 2. Go to https://codemagic.io → Sign up free → Add application → select repo.
# 3. Codemagic auto-detects this codemagic.yaml file.
# 4. Click "Start new build" → choose "ios-workflow".
# 5. ~15–20 min later: download GeoCrop.ipa from the Artifacts tab.
#
# INSTALL ON iPHONE (no Apple Developer account needed for testing):
#   - AltStore  : https://altstore.io  (free, sideload via PC/Mac)
#   - Sideloadly: https://sideloadly.io (free, Windows/Mac)
#
# FOR APP STORE / TESTFLIGHT (requires Apple Developer account $99/year):
#   - Add your .p12 certificate + provisioning profile in Codemagic dashboard
#   - Remove CODE_SIGNING_ALLOWED=NO lines above and enable automatic signing
# ─────────────────────────────────────────────────────────────────────────────
